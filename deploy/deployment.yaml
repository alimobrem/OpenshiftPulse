apiVersion: v1
kind: Namespace
metadata:
  name: openshiftpulse
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshiftpulse-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: openshiftpulse
  namespace: openshiftpulse
---
apiVersion: oauth.openshift.io/v1
kind: OAuthClient
metadata:
  name: openshiftpulse
grantMethod: auto
secret: openshiftpulse-oauth-secret-v1
redirectURIs:
- https://openshiftpulse-openshiftpulse.apps.rhamilto.devcluster.openshift.com/oauth/callback
scopeRestrictions:
- literals:
  - user:full
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openshiftpulse-nginx
  namespace: openshiftpulse
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        # Proxy K8s API — use the user's OAuth token passed by oauth-proxy
        location /api/kubernetes/ {
          proxy_pass https://kubernetes.default.svc/;
          proxy_ssl_verify off;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_read_timeout 120s;
        }

        # Proxy Prometheus
        location /api/prometheus/ {
          proxy_pass https://thanos-querier.openshift-monitoring.svc:9091/;
          proxy_ssl_verify off;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_read_timeout 60s;
        }

        # Proxy Alertmanager
        location /api/alertmanager/ {
          proxy_pass https://alertmanager-main.openshift-monitoring.svc:9094/;
          proxy_ssl_verify off;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_read_timeout 60s;
        }

        location / { try_files $uri $uri/ /index.html; }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: openshiftpulse
  template:
    metadata:
      labels:
        app: openshiftpulse
    spec:
      serviceAccountName: openshiftpulse
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: openshiftpulse
      containers:
      # OAuth Proxy sidecar — handles user login
      - name: oauth-proxy
        image: registry.redhat.io/openshift4/ose-oauth-proxy:latest
        args:
        - --https-address=:8443
        - --provider=openshift
        - --client-id=openshiftpulse
        - --client-secret=openshiftpulse-oauth-secret-v1
        - --upstream=http://localhost:8080
        - --tls-cert=/etc/tls/private/tls.crt
        - --tls-key=/etc/tls/private/tls.key
        - --cookie-secret=openshiftpulse-secret-cookie
        - --pass-access-token=true
        - --pass-basic-auth=false
        - --scope=user:full
        - --openshift-delegate-urls={"/api/kubernetes/":{"resource":"namespaces","verb":"list"}}
        ports:
        - containerPort: 8443
          name: https
        volumeMounts:
        - name: proxy-tls
          mountPath: /etc/tls/private
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
      # OpenShift Pulse app — serves static files + reverse proxies API
      - name: openshiftpulse
        image: image-registry.openshift-image-registry.svc:5000/openshiftpulse/openshiftpulse:latest
        command: ["nginx", "-g", "daemon off;"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
      volumes:
      - name: proxy-tls
        secret:
          secretName: openshiftpulse-proxy-tls
      - name: nginx-config
        configMap:
          name: openshiftpulse-nginx
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: openshiftpulse
---
apiVersion: v1
kind: Service
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: openshiftpulse-proxy-tls
spec:
  selector:
    app: openshiftpulse
  ports:
  - name: https
    port: 8443
    targetPort: 8443
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
spec:
  to:
    kind: Service
    name: openshiftpulse
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
