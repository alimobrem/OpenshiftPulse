{{- $clientSecret := include "openshiftpulse.clientSecret" . -}}
{{- $cookieSecret := include "openshiftpulse.cookieSecret" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: openshiftpulse-oauth-secrets
  namespace: {{ include "openshiftpulse.namespace" . }}
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  client-secret: {{ $clientSecret | quote }}
  cookie-secret: {{ $cookieSecret | quote }}
---
apiVersion: oauth.openshift.io/v1
kind: OAuthClient
metadata:
  name: openshiftpulse
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
grantMethod: auto
secret: {{ $clientSecret | quote }}
redirectURIs:
{{- if .Values.route.host }}
- https://{{ .Values.route.host }}/oauth/callback
{{- else }}
- https://openshiftpulse-{{ include "openshiftpulse.namespace" . }}.apps.{{ .Values.route.clusterDomain | default "cluster.local" }}/oauth/callback
{{- end }}
scopeRestrictions:
- literals:
  - user:full
