{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openshiftpulse.name" . }}
  namespace: {{ include "openshiftpulse.namespace" . }}
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "openshiftpulse.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - protocol: TCP
          port: 8443
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8443
  egress:
    - {}
{{- end }}
