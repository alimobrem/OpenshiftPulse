apiVersion: v1
kind: Service
metadata:
  name: openshiftpulse
  namespace: {{ include "openshiftpulse.namespace" . }}
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: openshiftpulse-proxy-tls
spec:
  selector:
    {{- include "openshiftpulse.selectorLabels" . | nindent 4 }}
  ports:
  - name: https
    port: 8443
    targetPort: 8443
    protocol: TCP
---
{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openshiftpulse
  namespace: {{ include "openshiftpulse.namespace" . }}
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
spec:
  {{- if .Values.route.host }}
  host: {{ .Values.route.host }}
  {{- end }}
  to:
    kind: Service
    name: openshiftpulse
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
