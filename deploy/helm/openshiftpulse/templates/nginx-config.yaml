apiVersion: v1
kind: ConfigMap
metadata:
  name: openshiftpulse-nginx
  namespace: {{ include "openshiftpulse.namespace" . }}
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen 8080;
        server_name _;
        root /opt/app-root/src;
        index index.html;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /api/kubernetes/ {
          proxy_pass https://kubernetes.default.svc/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/ca.crt;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_http_version 1.1;
          proxy_read_timeout 3600s;
        }

        location /api/prometheus/ {
          proxy_pass https://thanos-querier.openshift-monitoring.svc:9091/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_read_timeout 60s;
        }

        location /api/alertmanager/ {
          proxy_pass https://alertmanager-main.openshift-monitoring.svc:9094/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_read_timeout 60s;
        }

        location / { try_files $uri $uri/ /index.html; }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }
      }
    }
