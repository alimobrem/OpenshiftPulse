{{- if .Values.agent.enabled }}
{{/*
Umbrella-owned WS auth token secret.
Both the agent (via wsAuth.existingSecret) and the UI (via agent.wsTokenSecret)
reference this secret. Generated once, preserved on upgrades via lookup().
*/}}
{{- $secretName := printf "%s-ws-token" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/part-of: pulse
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if and $existing (index $existing.data "token") }}
  token: {{ index $existing.data "token" }}
  {{- else }}
  token: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
