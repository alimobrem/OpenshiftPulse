# OpenShift Pulse Umbrella Chart
# Single helm install for UI + Agent
#
# Usage:
#   helm dependency build deploy/helm/pulse/
#   helm upgrade --install pulse deploy/helm/pulse/ -n openshiftpulse ...
#
# The umbrella owns the WS token secret. Both subcharts reference it.
# No manual token management needed.

# ─── UI Subchart (openshiftpulse) ─────────────────────────────────────────────
openshiftpulse:
  replicas: 2

  image:
    repository: quay.io/amobrem/openshiftpulse
    tag: latest
    pullPolicy: Always

  oauthProxy:
    image: ""  # Set by deploy.sh (auto-detected from cluster)

  route:
    enabled: true
    host: ""
    clusterDomain: ""  # Set by deploy.sh (auto-detected)

  monitoring:
    prometheus:
      enabled: true
      host: thanos-querier.openshift-monitoring.svc:9091
    alertmanager:
      enabled: true
      host: alertmanager-main.openshift-monitoring.svc:9094

  agent:
    enabled: true
    # Set by deploy.sh: <release>-openshift-sre-agent
    serviceName: ""
    # Literal fallback for fresh installs (set by deploy.sh)
    wsToken: ""
    # Reference to umbrella-owned secret (set by deploy.sh: <release>-ws-token)
    wsTokenSecret: ""
    wsTokenSecretKey: "token"

  quota:
    enabled: true

# ─── Agent Subchart (openshift-sre-agent, alias: agent) ──────────────────────
agent:
  enabled: true

  # Ensure predictable naming: <release>-openshift-sre-agent
  nameOverride: "openshift-sre-agent"

  replicaCount: 1

  image:
    repository: quay.io/amobrem/pulse-agent
    tag: latest
    pullPolicy: Always
    internalRegistry: false

  # AI Backend — deploy.sh sets one of these
  vertexAI:
    projectId: ""
    region: ""
    existingSecret: ""

  anthropicApiKey:
    existingSecret: ""

  rbac:
    create: true
    allowWriteOperations: false
    allowSecretAccess: false

  database:
    type: postgresql
    postgresql:
      enabled: true

  memory:
    enabled: true
    persistence:
      enabled: true

  # Reference umbrella-owned WS token (set by deploy.sh: <release>-ws-token)
  wsAuth:
    existingSecret: ""
    secretKey: "token"
